<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#F8F9FA;--surface:#FFF;--border:#DEE2E6;--border-light:#E9ECEF;
--text:#212529;--text-sec:#6C757D;--text-mut:#ADB5BD;
--pri:#3B5BDB;--pri-light:#DBE4FF;--pri-dark:#364FC7;
--ok:#2B8A3E;--ok-light:#D3F9D8;--err:#C92A2A;--err-light:#FFE3E3;
--warn:#E67700;--warn-light:#FFF3BF;
--r:8px;--rlg:12px;--sh:0 1px 3px rgba(0,0,0,.08);--sh-lg:0 8px 24px rgba(0,0,0,.12);
--font:'DM Sans',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
--tr:.15s ease;--sidebar:240px;--btm:64px;--safe:env(safe-area-inset-bottom,0px);
}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh;min-height:100dvh}
.sidebar{width:var(--sidebar);background:#1A1B1E;color:#C1C2C5;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sb-brand{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-brand h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
.sb-dot{width:8px;height:8px;border-radius:50%;background:var(--pri);flex-shrink:0}
.sb-nav{padding:12px 8px;flex:1;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;cursor:pointer;font-size:13.5px;font-weight:450;transition:all var(--tr);color:#909296;margin-bottom:2px;position:relative}
.sb-item:hover{background:rgba(255,255,255,.06);color:#C1C2C5}
.sb-item.act{background:rgba(59,91,219,.15);color:#748FFC}
.sb-item .badge{position:absolute;right:10px;background:var(--err);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sb-ent{margin:4px 8px;padding:10px 12px;border-radius:8px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all var(--tr);border:1px solid transparent}
.sb-ent:hover{border-color:rgba(255,255,255,.1)}
.sb-ent.sel{border-color:rgba(255,255,255,.2)}
.sb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#5C5F66;padding:0 12px 6px}
.main{margin-left:var(--sidebar);flex:1;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px}
.topbar h2{font-size:18px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
.top-acts{display:flex;gap:8px;align-items:center}
.content{padding:24px;max-width:1200px}
.btmbar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:#1A1B1E;border-top:1px solid rgba(255,255,255,.1);padding-bottom:var(--safe)}
.btm-inner{display:flex;height:var(--btm);align-items:center;justify-content:space-around}
.btm-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:#5C5F66;font-size:10px;font-weight:600;cursor:pointer;padding:6px 10px;border-radius:8px;transition:all var(--tr);position:relative}
.btm-item.act{color:#748FFC}
.btm-item .badge{position:absolute;top:0;right:2px;background:var(--err);color:#fff;font-size:9px;font-weight:700;padding:0 4px;border-radius:8px;min-width:14px;text-align:center;line-height:14px}
@media(max-width:767px){
.sidebar{display:none}.main{margin-left:0;padding-bottom:calc(var(--btm) + var(--safe) + 8px)}.btmbar{display:block}
.topbar{padding:12px 16px}.topbar h2{font-size:16px}.content{padding:16px}
.stats-grid{grid-template-columns:1fr 1fr}.form-row,.form-row-3{grid-template-columns:1fr}
.dash-grid{grid-template-columns:1fr!important}.modal{margin:0;border-radius:12px 12px 0 0;max-height:92vh}
.modal-ov{align-items:flex-end;padding:0}.line-item{grid-template-columns:1fr;gap:4px;padding:12px 0}
.line-hdr{display:none}.search-bar{width:100%}.tpl-btns{flex-direction:column}
.tw th,.tw td{padding:8px 6px;font-size:12px}.ent-flt-m{display:flex!important}
}
@media(min-width:768px){.ent-flt-m{display:none!important}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-t{font-size:14px;font-weight:700;letter-spacing:-.2px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:16px 20px;box-shadow:var(--sh)}
.stat-l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-sec)}
.stat-v{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-top:4px}
.stat-s{font-size:12px;color:var(--text-mut);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;font-size:13px;font-weight:550;border:none;cursor:pointer;transition:all var(--tr);font-family:var(--font);white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn-p{background:var(--pri);color:#fff}.btn-p:hover{background:var(--pri-dark)}
.btn-ok{background:var(--ok);color:#fff}.btn-ok:hover{background:#237032}
.btn-err{background:var(--err);color:#fff}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-o:hover{background:var(--bg)}
.btn-g{background:transparent;color:var(--text-sec)}.btn-g:hover{background:var(--bg);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
.fg{margin-bottom:14px}.fl{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--text-sec)}
.fi,.fs,.ft{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:var(--font);transition:border-color var(--tr);background:#fff;appearance:none;-webkit-appearance:none}
.fi:focus,.fs:focus,.ft:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-light)}
.ft{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fhint{font-size:11px;color:var(--text-mut);margin-top:3px}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-sec);border-bottom:2px solid var(--border);background:var(--bg);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border-light);vertical-align:middle}
tr:hover td{background:#F8F9FA}
.mono{font-family:var(--mono);font-size:12.5px}
.status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.etag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10.5px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;animation:fi .15s ease}
.modal{background:var(--surface);border-radius:var(--rlg);width:100%;max-width:780px;box-shadow:var(--sh-lg);animation:su .2s ease}
.modal.w{max-width:960px}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{font-size:16px;font-weight:700}
.modal-b{padding:20px;max-height:70vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-f{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 16px;font-size:13px;font-weight:550;cursor:pointer;color:var(--text-mut);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all var(--tr);white-space:nowrap}
.tab:hover{color:var(--text-sec)}.tab.act{color:var(--pri);border-bottom-color:var(--pri)}
.empty{text-align:center;padding:48px 20px;color:var(--text-mut)}
.empty-i{font-size:40px;margin-bottom:8px;opacity:.4}
.empty-t{font-size:14px;font-weight:500}
.sec-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-mut);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border-light)}
.search-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:13px;width:260px}
.search-bar input{border:none;background:transparent;outline:none;font-size:13px;font-family:var(--font);flex:1;color:var(--text)}
.line-item{display:grid;grid-template-columns:3fr 1fr 1fr 1fr 1fr auto;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-light)}
.line-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-mut);padding-bottom:6px;border-bottom:2px solid var(--border)}
.addr-ac{position:relative}
.addr-sug{position:absolute;top:100%;left:0;right:0;z-index:300;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;box-shadow:0 4px 12px rgba(0,0,0,.08);max-height:200px;overflow-y:auto}
.addr-s{padding:10px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border-light);transition:background var(--tr)}
.addr-s:hover{background:var(--pri-light)}
.addr-m{font-weight:550}.addr-sub{font-size:11px;color:var(--text-sec)}
.map-c{height:400px;border-radius:var(--rlg);overflow:hidden;border:1px solid var(--border)}
@media(max-width:767px){.map-c{height:300px}}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dp{background:#fff;padding:32px;border:1px solid var(--border);border-radius:var(--rlg);font-size:13px;line-height:1.6}
.dp-h{display:flex;justify-content:space-between;margin-bottom:24px;gap:16px}
.dp-ent{font-size:12px}.dp-ent strong{font-size:16px;display:block;margin-bottom:4px}
.dp-cli{text-align:right;font-size:12px}.dp-cli strong{font-size:14px;display:block;margin-bottom:4px}
.dp-tit{font-size:15px;font-weight:700;margin-bottom:4px}
.dp-meta{font-size:12px;color:var(--text-sec);margin-bottom:16px}
.dp-desc{margin-bottom:16px;white-space:pre-line;font-size:12.5px;color:#495057}
.dp-tot{text-align:right;margin-top:12px;font-size:13px}
.dp-tot .tl{padding:3px 0}.dp-tot .ttc{font-size:16px;font-weight:700}
.dp-foot{margin-top:24px;font-size:11px;color:var(--text-sec)}
.auth-p{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1A1B1E 0%,#2C2E33 100%)}
.auth-c{background:var(--surface);border-radius:var(--rlg);padding:40px;width:100%;max-width:400px;box-shadow:var(--sh-lg)}
.auth-c h1{font-size:22px;font-weight:700;margin-bottom:4px}
.auth-c p{font-size:14px;color:var(--text-sec);margin-bottom:24px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh}
.alert-r{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r);margin-bottom:8px;font-size:13px}
.alert-r.w{background:var(--warn-light);border-left:3px solid var(--warn)}
.tpl-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1B1E;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:550;z-index:500;box-shadow:var(--sh-lg);animation:ti .3s ease}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>

// ADDRESS SEARCH (api-adresse.data.gouv.fr)
// ============================================================
function AddrSearch({value,onChange,onSelect,placeholder}) {
  const [q,setQ]=useState(value||'');const [sug,setSug]=useState([]);const [open,setOpen]=useState(false);
  const timer=useRef(null);const wr=useRef(null);
  useEffect(()=>{setQ(value||'')},[value]);
  useEffect(()=>{const h=e=>{if(wr.current&&!wr.current.contains(e.target))setOpen(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[]);
  const search=async q=>{if(q.length<3){setSug([]);return;}try{const r=await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=5`);const d=await r.json();if(d?.features){setSug(d.features.map(f=>({label:f.properties.label,name:f.properties.name,postcode:f.properties.postcode,city:f.properties.city,context:f.properties.context,lat:f.geometry.coordinates[1],lng:f.geometry.coordinates[0]})));setOpen(true);}}catch(e){}};
  const hc=e=>{const v=e.target.value;setQ(v);onChange?.(v);clearTimeout(timer.current);timer.current=setTimeout(()=>search(v),300)};
  const hs=s=>{setQ(s.label);setOpen(false);setSug([]);onSelect?.(s)};
  return(<div className="addr-ac" ref={wr}><input className="fi" value={q} onChange={hc} onFocus={()=>sug.length>0&&setOpen(true)} placeholder={placeholder||"Tapez une adresse…"} autoComplete="off"/>
    {open&&sug.length>0&&<div className="addr-sug">{sug.map((s,i)=><div key={i} className="addr-s" onClick={()=>hs(s)}><div className="addr-m">{s.name}</div><div className="addr-sub">{s.postcode} {s.city} — {s.context}</div></div>)}</div>}
  </div>);
}

function dlPDF(devis,ent,lines) {
  const {jsPDF}=window.jspdf; const doc=new jsPDF('p','mm','a4');
  const W=210,m=15,cW=W-m*2; let y=20;
  const hex=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const [pr,pg,pb]=hex(ent.color||'#3B5BDB');
  doc.setFillColor(pr,pg,pb);doc.rect(0,0,W,4,'F');
  doc.setFontSize(16);doc.setFont('helvetica','bold');doc.setTextColor(pr,pg,pb);doc.text(ent.name,m,y);y+=6;
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
  doc.text(ent.legal_name||'',m,y);y+=4;doc.text(ent.address||'',m,y);y+=4;doc.text(`${ent.postal_code||''} ${ent.city||''}`,m,y);y+=4;
  if(ent.phone){doc.text(`Tél : ${ent.phone}`,m,y);y+=4;}
  const cx=W-m;let cy=20;doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
  doc.text(devis.client_name||'',cx,cy,{align:'right'});cy+=5;doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
  if(devis.client_address){doc.text(devis.client_address,cx,cy,{align:'right'});cy+=4;}
  doc.text(`${devis.client_postal||''} ${devis.client_city||''}`,cx,cy,{align:'right'});cy+=4;doc.text('France',cx,cy,{align:'right'});
  y=Math.max(y,cy)+10;
  doc.setFillColor(pr,pg,pb);doc.roundedRect(m,y,cW,18,2,2,'F');
  doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);doc.text(`Devis N° ${devis.number}`,m+5,y+7);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text(devis.title||'',m+5,y+13);y+=22;
  doc.setFontSize(9);doc.setTextColor(100,100,100);doc.text(`Date d'émission : ${fDate(devis.created_at)}     ·     Validité : ${devis.validity_days||30} jours`,m,y);y+=8;
  if(devis.description){doc.setFontSize(9);doc.setTextColor(60,60,60);const dl=doc.splitTextToSize(devis.description,cW);doc.text(dl,m,y);y+=dl.length*4+6;}
  const tl=(lines||[]).map(l=>[l.designation,Number(l.qty).toLocaleString('fr-FR',{minimumFractionDigits:2}),l.unit||'',Number(l.prix_unit).toFixed(2),`${l.tva_rate||0}%`,fEuro((l.qty||0)*(l.prix_unit||0))]);
  doc.autoTable({startY:y,margin:{left:m,right:m},head:[['Désignation','Quantité','Unité','Prix unit.','TVA','Montant HT']],body:tl,theme:'grid',
    headStyles:{fillColor:[pr,pg,pb],textColor:255,fontSize:8,fontStyle:'bold',halign:'center',cellPadding:3},
    bodyStyles:{fontSize:8.5,cellPadding:3,textColor:[40,40,40]},
    columnStyles:{0:{cellWidth:'auto',halign:'left'},1:{cellWidth:22,halign:'right'},2:{cellWidth:18,halign:'center'},3:{cellWidth:22,halign:'right'},4:{cellWidth:15,halign:'center'},5:{cellWidth:28,halign:'right',fontStyle:'bold'}},
    alternateRowStyles:{fillColor:[248,249,250]}});
  y=doc.lastAutoTable.finalY+8;
  const tx=W-m-60;doc.setFontSize(9);doc.setTextColor(80,80,80);
  doc.text('Total HT :',tx,y);doc.setFont('helvetica','bold');doc.text(fEuro(devis.total_ht),W-m,y,{align:'right'});y+=5;
  if((ent.tva_rate||0)>0){doc.setFont('helvetica','normal');doc.text(`TVA ${ent.tva_rate}% :`,tx,y);doc.setFont('helvetica','bold');doc.text(fEuro(devis.total_tva),W-m,y,{align:'right'});y+=5;}
  doc.setFillColor(245,245,245);doc.roundedRect(tx-5,y-4,cW-tx+m+5,10,1,1,'F');
  doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(pr,pg,pb);doc.text('Total TTC :',tx,y+3);doc.text(fEuro(devis.total_ttc),W-m,y+3,{align:'right'});y+=16;
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);
  if(ent.tva_mention){doc.text(ent.tva_mention,m,y);y+=4;}if(ent.cgv){doc.text(ent.cgv,m,y);y+=4;}y+=4;
  let ll=`SIREN ${ent.siren}`;if(ent.naf)ll+=` - NAF ${ent.naf}`;if(ent.rcs)ll+=` - RCS ${ent.rcs}`;doc.text(ll,m,y);y+=4;
  if(ent.tva_intra){doc.text(`TVA intracommunautaire : ${ent.tva_intra}`,m,y);y+=4;}
  if(ent.iban){doc.text(`IBAN: ${ent.iban}  ·  BIC: ${ent.bic}`,m,y);y+=4;}y+=8;
  doc.setFont('helvetica','italic');doc.text('Pour être accepté, le devis doit être daté, signé et suivi de la mention manuscrite « Bon pour accord ».',m,y);
  doc.setFillColor(pr,pg,pb);doc.rect(0,293,W,4,'F');
  doc.save(`Devis_${String(devis.number).padStart(6,'0')}_${(devis.client_name||'').replace(/\s+/g,'_')}.pdf`);
}

// ============================================================
// DATA STORE HOOK
// ============================================================
function useStore() {
  const [ents,setEnts]=useState([]);const [svcs,setSvcs]=useState([]);const [cons,setCons]=useState([]);
  const [tpls,setTpls]=useState([]);const [devis,setDevis]=useState([]);const [loading,setLoading]=useState(true);

  const fetchAll=useCallback(async()=>{
    setLoading(true);
    const [e,s,c,t,d]=await Promise.all([
      sb.from('entities').select('*'),sb.from('services').select('*').order('sort_order'),
      sb.from('consumables').select('*').order('sort_order'),sb.from('templates').select('*').order('sort_order'),
      sb.from('devis').select('*').order('created_at',{ascending:false})]);
    setEnts(e.data||[]);setSvcs(s.data||[]);setCons(c.data||[]);setTpls(t.data||[]);setDevis(d.data||[]);setLoading(false);
  },[]);
  useEffect(()=>{fetchAll()},[fetchAll]);

  const fetchLines=async id=>{const {data}=await sb.from('devis_lines').select('*').eq('devis_id',id).order('sort_order');return data||[];};
  const createDevis=async(dd,lines)=>{
    const {data:num}=await sb.rpc('get_next_devis_number',{p_entity_id:dd.entity_id});
    const {data:nd,error}=await sb.from('devis').insert({...dd,number:num}).select().single();
    if(error||!nd)return;
    if(lines.length>0){await sb.from('devis_lines').insert(lines.map((l,i)=>({devis_id:nd.id,line_type:l.line_type,catalog_ref:l.catalog_ref||null,designation:l.designation,qty:l.qty,unit:l.unit,prix_unit:l.prix_unit,tva_rate:l.tva_rate,sort_order:i})));}
    await fetchAll();return nd;
  };
  const updateDevis=async(id,upd,lines)=>{
    await sb.from('devis').update(upd).eq('id',id);
    if(lines){await sb.from('devis_lines').delete().eq('devis_id',id);if(lines.length>0)await sb.from('devis_lines').insert(lines.map((l,i)=>({devis_id:id,line_type:l.line_type,catalog_ref:l.catalog_ref||null,designation:l.designation,qty:l.qty,unit:l.unit,prix_unit:l.prix_unit,tva_rate:l.tva_rate,sort_order:i})));}
    await fetchAll();
  };
  const deleteDevis=async id=>{await sb.from('devis_lines').delete().eq('devis_id',id);await sb.from('devis').delete().eq('id',id);await fetchAll();};
  const updateStatus=async(id,status,extras={})=>{await sb.from('devis').update({status,...extras}).eq('id',id);await fetchAll();};
  const upsertSvc=async s=>{await sb.from('services').upsert(s);await fetchAll();};
  const deleteSvc=async id=>{await sb.from('services').delete().eq('id',id);await fetchAll();};
  const upsertCons=async c=>{await sb.from('consumables').upsert(c);await fetchAll();};
  const deleteCons=async id=>{await sb.from('consumables').delete().eq('id',id);await fetchAll();};
  const upsertTpl=async t=>{await sb.from('templates').upsert(t);await fetchAll();};
  const deleteTpl=async id=>{await sb.from('templates').delete().eq('id',id);await fetchAll();};
  return {ents,svcs,cons,tpls,devis,loading,fetchAll,fetchLines,createDevis,updateDevis,deleteDevis,updateStatus,upsertSvc,deleteSvc,upsertCons,deleteCons,upsertTpl,deleteTpl};
}

function MapView({devisList,entities}) {
  const ref=useRef(null);const mapRef=useRef(null);
  useEffect(()=>{if(!ref.current||mapRef.current)return;const m=L.map(ref.current).setView([46.8,-0.8],9);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:18}).addTo(m);mapRef.current=m;return()=>{m.remove();mapRef.current=null}},[]);
  useEffect(()=>{const m=mapRef.current;if(!m)return;m.eachLayer(l=>{if(l instanceof L.Marker)m.removeLayer(l)});const mk=[];
    devisList.forEach(d=>{const lat=d.delivery_lat,lng=d.delivery_lng;if(!lat||!lng)return;const ent=entities.find(e=>e.id===d.entity_id);const co=ent?.color||'#3B5BDB';
      const ic=L.divIcon({className:'',html:`<div style="width:28px;height:28px;border-radius:50%;background:${co};border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>`,iconSize:[28,28],iconAnchor:[14,14]});
      const marker=L.marker([lat,lng],{icon:ic}).addTo(m);marker.bindPopup(`<div style="font-family:DM Sans,sans-serif"><strong>${d.client_name}</strong><br><span style="font-size:11px;color:#6C757D">N°${d.number} · ${SL[d.status]}</span><br><strong>${fEuro(d.total_ttc)}</strong>${d.intervention_date?`<br>${fDate(d.intervention_date)}`:''}</div>`);mk.push(marker)});
    if(mk.length>0)m.fitBounds(L.featureGroup(mk).getBounds().pad(0.1));
  },[devisList,entities]);
  return <div ref={ref} className="map-c"/>;
}

function Dash({st,cnt,eMap,fEnt,go}) {

  return(<>

function Plan({devis,eMap,sm}) {
  const s=devis.filter(d=>d.intervention_date&&['scheduled','flight_requested','flight_approved'].includes(d.status)).sort((a,b)=>new Date(a.intervention_date)-new Date(b.intervention_date));
  return(<div className="card"><div className="card-h"><div className="card-t">Interventions à venir</div></div>
    {s.length===0?<div className="empty"><div className="empty-t">Aucune intervention</div></div>:<div className="tw"><table><thead><tr><th>Date</th><th>N°</th><th>Client</th><th>Lieu</th><th>Structure</th><th>Statut</th><th></th></tr></thead>
      <tbody>{s.map(d=>{const dd=dDiff(new Date(),d.intervention_date);return<tr key={d.id}><td><div style={{fontWeight:600}}>{fDate(d.intervention_date)}</div><div style={{fontSize:11,color:dd<=3?'var(--err)':'var(--text-mut)'}}>{dd<=0?"Aujourd'hui":dd===1?'Demain':`J-${dd}`}</div></td><td className="mono">{d.number}</td><td style={{fontWeight:550}}>{d.client_name}</td><td style={{fontSize:12}}>{d.client_city||d.delivery_city}</td><td><ETag e={eMap[d.entity_id]}/></td><td><Status s={d.status}/></td><td><button className="btn btn-g btn-xs" onClick={()=>sm({t:'viewD',d})}>{Ic.eye({s:14})}</button></td></tr>})}</tbody></table></div>}</div>);
}
function Flt({devis,st,eMap,show}) {
  const n=devis.filter(d=>['accepted','scheduled','flight_requested'].includes(d.status));
  const mk=async(id,t)=>{if(t==='req')await st.updateStatus(id,'flight_requested',{flight_requested:true});if(t==='ok')await st.updateStatus(id,'flight_approved',{flight_approved:true});show('Mis à jour')};
  return(<div className="card"><div className="card-h"><div className="card-t">Notifications de vol</div></div>
    {n.length===0?<div className="empty"><div className="empty-t">Aucune notification</div></div>:<div className="tw"><table><thead><tr><th>N°</th><th>Client</th><th>Date</th><th>Structure</th><th>Demandé</th><th>Approuvé</th><th></th></tr></thead>
      <tbody>{n.map(d=><tr key={d.id}><td className="mono">{d.number}</td><td style={{fontWeight:550}}>{d.client_name}</td><td>{d.intervention_date?fDate(d.intervention_date):'—'}</td><td><ETag e={eMap[d.entity_id]}/></td><td>{d.flight_requested?'✅':'⬜'}</td><td>{d.flight_approved?'✅':'⬜'}</td>
        <td>{!d.flight_requested&&<button className="btn btn-o btn-xs" onClick={()=>mk(d.id,'req')}>Demandé</button>}{d.flight_requested&&!d.flight_approved&&<button className="btn btn-ok btn-xs" onClick={()=>mk(d.id,'ok')}>Approuvé</button>}</td></tr>)}</tbody></table></div>}</div>);
}
function MapPg({devis,ents}) {
  const wc=devis.filter(d=>d.delivery_lat);
  return(<><div style={{marginBottom:12,fontSize:13,color:'var(--text-sec)'}}>{wc.length} chantier{wc.length>1?'s':''} géolocalisé{wc.length>1?'s':''}</div><MapView devisList={devis} entities={ents}/></>);
}
function Inv({devis,st,eMap,show}) {
  const ti=devis.filter(d=>d.status==='completed');const ri=devis.filter(d=>d.status==='invoiced').slice(0,10);
  return(<><div className="card"><div className="card-h"><div className="card-t">Factures à éditer</div></div>
    {ti.length===0?<div className="empty"><div className="empty-t">Aucune facture en attente</div></div>:<div className="tw"><table><thead><tr><th>N°</th><th>Client</th><th>Réalisé</th><th>Structure</th><th>Montant</th><th></th></tr></thead>
      <tbody>{ti.map(d=><tr key={d.id}><td className="mono">{d.number}</td><td style={{fontWeight:550}}>{d.client_name}</td><td>{fDate(d.completed_date)}</td><td><ETag e={eMap[d.entity_id]}/></td><td className="mono">{fEuro(d.total_ttc)}</td>
        <td><button className="btn btn-p btn-xs" onClick={async()=>{await st.updateStatus(d.id,'invoiced',{invoiced_date:new Date().toISOString()});show('Facturé')}}>{Ic.check({s:13})} Facturé</button></td></tr>)}</tbody></table></div>}</div>
    {ri.length>0&&<div className="card"><div className="card-h"><div className="card-t">Dernières factures</div></div><div className="tw"><table><thead><tr><th>N°</th><th>Client</th><th>Facturé</th><th>Structure</th><th>Montant</th></tr></thead>
      <tbody>{ri.map(d=><tr key={d.id}><td className="mono">{d.number}</td><td style={{fontWeight:550}}>{d.client_name}</td><td>{fDate(d.invoiced_date)}</td><td><ETag e={eMap[d.entity_id]}/></td><td className="mono">{fEuro(d.total_ttc)}</td></tr>)}</tbody></table></div></div>}</>);
}
function Rem({devis,st,eMap,show}) {
  const now=new Date();const items=devis.filter(d=>d.status==='invoiced'&&d.completed_date&&!d.reminder_done).map(d=>{const y=new Date(d.completed_date);y.setFullYear(y.getFullYear()+1);return{...d,rd:y,du:dDiff(now,y)}}).filter(d=>d.du<=60).sort((a,b)=>a.du-b.du);
  return(<div className="card"><div className="card-h"><div className="card-t">Vérifications à effectuer</div></div>
    {items.length===0?<div className="empty"><div className="empty-t">Aucun rappel</div></div>:<div className="tw"><table><thead><tr><th>N°</th><th>Client</th><th>Réalisé</th><th>Échéance</th><th>Jours</th><th></th></tr></thead>
      <tbody>{items.map(d=><tr key={d.id}><td className="mono">{d.number}</td><td style={{fontWeight:550}}>{d.client_name}</td><td>{fDate(d.completed_date)}</td><td>{fDate(d.rd)}</td>
        <td><span style={{fontWeight:700,color:d.du<=0?'var(--err)':'var(--warn)'}}>{d.du<=0?'DÉPASSÉ':`J-${d.du}`}</span></td>
        <td><button className="btn btn-ok btn-xs" onClick={async()=>{await st.updateDevis(d.id,{reminder_done:true});show('Fait')}}>{Ic.check({s:13})} Fait</button></td></tr>)}</tbody></table></div>}</div>);
}

// DEVIS FORM MODAL
// ============================================================
function DForm({st,eMap,onClose,de,show}) {
  const isE=!!de;
  const [ent,setEnt]=useState(de?.entity_id||st.ents[0]?.id||'drone85');
  const [cn,setCn]=useState(de?.client_name||'');const [ca,setCa]=useState(de?.client_address||'');
  const [cp,setCp]=useState(de?.client_postal||'');const [cc,setCc]=useState(de?.client_city||'');
  const [da,setDa]=useState(de?.delivery_address||'');const [dp,setDp]=useState(de?.delivery_postal||'');
  const [dc,setDc]=useState(de?.delivery_city||'');const [dlat,setDlat]=useState(de?.delivery_lat||null);
  const [dlng,setDlng]=useState(de?.delivery_lng||null);const [vd,setVd]=useState(de?.validity_days||30);
  const [desc,setDesc]=useState(de?.description||'');const [title,setTitle]=useState(de?.title||'');
  const [m2,setM2]=useState(de?.surface_m2||'');const [lines,setLines]=useState([]);const [saving,setSaving]=useState(false);
  const loaded=useRef(false);const e=eMap[ent]||st.ents[0];

  useEffect(()=>{if(isE&&!loaded.current){loaded.current=true;st.fetchLines(de.id).then(dl=>setLines(dl.map(l=>({_k:Math.random().toString(36).slice(2),line_type:l.line_type,catalog_ref:l.catalog_ref,designation:l.designation,qty:l.qty,unit:l.unit,prix_unit:l.prix_unit,tva_rate:l.tva_rate}))))}},[isE]);

  const addL=t=>setLines(p=>[...p,{_k:Math.random().toString(36).slice(2),line_type:t,catalog_ref:null,designation:'',qty:t==='service'?(parseFloat(m2)||0):0,unit:t==='consumable'?'litres':'m²',prix_unit:0,tva_rate:e?.tva_rate??20}]);
  const updL=(k,f,v)=>setLines(p=>p.map(l=>{if(l._k!==k)return l;const u={...l,[f]:v};if(f==='catalog_ref'&&v){if(l.line_type==='service'){const c=st.svcs.find(s=>s.id===v);if(c){u.designation=c.designation;u.prix_unit=c.prix_m2;u.qty=parseFloat(m2)||0;u.unit='m²'}}else if(l.line_type==='consumable'){const c=st.cons.find(x=>x.id===v);if(c){u.designation=c.designation;u.prix_unit=c.prix_litre;u.qty=m2?Math.ceil(parseFloat(m2)*c.conso_m2*10)/10:0;u.unit=c.unit}}}return u}));
  const rmL=k=>setLines(p=>p.filter(l=>l._k!==k));
  const applyTpl=t=>{setDesc(t.description||'');if(t.title)setTitle(t.title);const nl=[];(t.default_services||[]).forEach(sid=>{const c=st.svcs.find(s=>s.id===sid);if(c)nl.push({_k:Math.random().toString(36).slice(2),line_type:'service',catalog_ref:sid,designation:c.designation,qty:parseFloat(m2)||0,unit:'m²',prix_unit:c.prix_m2,tva_rate:e?.tva_rate??20})});(t.default_consumables||[]).forEach(cid=>{const c=st.cons.find(x=>x.id===cid);if(c){const l=m2?Math.ceil(parseFloat(m2)*c.conso_m2*10)/10:0;nl.push({_k:Math.random().toString(36).slice(2),line_type:'consumable',catalog_ref:cid,designation:c.designation,qty:l,unit:c.unit,prix_unit:c.prix_litre,tva_rate:e?.tva_rate??20})}});if(nl.length)setLines(nl)};

  const tHT=lines.reduce((s,l)=>s+(l.qty||0)*(l.prix_unit||0),0);const tTVA=lines.reduce((s,l)=>s+(l.qty||0)*(l.prix_unit||0)*((l.tva_rate||0)/100),0);const tTTC=tHT+tTVA;

  const save=async(draft)=>{if(!cn){alert('Nom requis');return;}setSaving(true);
    const dd={entity_id:ent,client_name:cn,client_address:ca,client_postal:cp,client_city:cc,delivery_address:da,delivery_postal:dp,delivery_city:dc,delivery_lat:dlat,delivery_lng:dlng,title,description:desc,surface_m2:parseFloat(m2)||0,validity_days:vd,total_ht:tHT,total_tva:tTVA,total_ttc:tTTC,status:draft?'draft':'sent'};
    const ld=lines.map(l=>({line_type:l.line_type,catalog_ref:l.catalog_ref,designation:l.designation,qty:l.qty,unit:l.unit,prix_unit:l.prix_unit,tva_rate:l.tva_rate}));
    if(isE)await st.updateDevis(de.id,dd,ld);else await st.createDevis(dd,ld);setSaving(false);show(isE?'Mis à jour':'Créé');onClose()};

  return(<Modal title={isE?`Modifier N°${de.number}`:'Nouveau devis'} onClose={onClose} wide footer={<>
    <button className="btn btn-o" onClick={onClose}>Annuler</button>
    <button className="btn btn-o" onClick={()=>save(true)} disabled={saving}>Brouillon</button>
    <button className="btn btn-p" onClick={()=>save(false)} disabled={saving}>{saving?'…':'Enregistrer'}</button></>}>
    <div className="fg"><label className="fl">Structure</label><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
      {st.ents.map(x=><button key={x.id} className="btn" style={{background:ent===x.id?x.color:'transparent',color:ent===x.id?'#fff':x.color,border:`2px solid ${x.color}`,fontWeight:700,fontSize:12}} onClick={()=>setEnt(x.id)}>{x.name}{x.tva_rate===0&&<span style={{fontSize:10,opacity:.8,marginLeft:4}}>(sans TVA)</span>}</button>)}</div></div>
    <div className="sec-t">Client</div>
    <div className="form-row"><div className="fg"><label className="fl">Nom *</label><input className="fi" value={cn} onChange={e=>setCn(e.target.value)}/></div><div className="fg"><label className="fl">Ville</label><input className="fi" value={cc} onChange={e=>setCc(e.target.value)}/></div></div>
    <div className="form-row"><div className="fg"><label className="fl">Adresse</label><input className="fi" value={ca} onChange={e=>setCa(e.target.value)}/></div><div className="fg"><label className="fl">Code postal</label><input className="fi" value={cp} onChange={e=>setCp(e.target.value)}/></div></div>
    <div className="sec-t">Adresse du chantier</div>
    <div className="fg"><label className="fl">Recherche d'adresse</label><AddrSearch value={da} onChange={v=>setDa(v)} onSelect={s=>{setDa(s.name);setDp(s.postcode);setDc(s.city);setDlat(s.lat);setDlng(s.lng)}} placeholder="Tapez l'adresse du chantier…"/><div className="fhint">Géolocalisation auto sur la carte</div></div>
    <div className="form-row-3"><div className="fg"><label className="fl">Adresse</label><input className="fi" value={da} onChange={e=>setDa(e.target.value)}/></div><div className="fg"><label className="fl">CP</label><input className="fi" value={dp} onChange={e=>setDp(e.target.value)}/></div><div className="fg"><label className="fl">Ville</label><input className="fi" value={dc} onChange={e=>setDc(e.target.value)}/></div></div>
    <div className="sec-t">Devis</div>
    <div className="form-row-3"><div className="fg"><label className="fl">Intitulé</label><input className="fi" value={title} onChange={e=>setTitle(e.target.value)}/></div><div className="fg"><label className="fl">Surface (m²)</label><input className="fi" type="number" value={m2} onChange={e=>setM2(e.target.value)}/></div><div className="fg"><label className="fl">Validité (j)</label><input className="fi" type="number" value={vd} onChange={e=>setVd(parseInt(e.target.value)||30)}/></div></div>
    {st.tpls.length>0&&<div className="fg"><label className="fl">Modèle</label><div className="tpl-btns">{st.tpls.map(t=><button key={t.id} className="btn btn-xs btn-o" onClick={()=>applyTpl(t)}>{Ic.tpl({s:12})} {t.name}</button>)}</div></div>}
    <div className="fg"><label className="fl">Description / Déroulé</label><textarea className="ft" rows={6} value={desc} onChange={e=>setDesc(e.target.value)}/></div>
    <div className="sec-t">Lignes</div>
    <div className="line-item line-hdr"><div>Désignation</div><div>Quantité</div><div>Unité</div><div>Prix unit.</div><div>Montant HT</div><div></div></div>
    {lines.map(l=><div key={l._k} className="line-item">
      <div>{l.line_type==='service'?<select className="fs" value={l.catalog_ref||''} onChange={e=>updL(l._k,'catalog_ref',e.target.value)} style={{fontSize:12.5}}><option value="">— Prestation —</option>{st.svcs.map(s=><option key={s.id} value={s.id}>{s.designation} ({s.prix_m2}€/m²)</option>)}</select>
        :l.line_type==='consumable'?<select className="fs" value={l.catalog_ref||''} onChange={e=>updL(l._k,'catalog_ref',e.target.value)} style={{fontSize:12.5}}><option value="">— Consommable —</option>{st.cons.map(c=><option key={c.id} value={c.id}>{c.designation} ({c.conso_m2}L/m²)</option>)}</select>
        :<input className="fi" value={l.designation} onChange={e=>updL(l._k,'designation',e.target.value)} placeholder="Ligne libre" style={{fontSize:12.5}}/>}</div>
      <div><input className="fi mono" type="number" step="0.01" value={l.qty} onChange={e=>updL(l._k,'qty',parseFloat(e.target.value)||0)} style={{fontSize:12,textAlign:'right'}}/></div>
      <div><input className="fi" value={l.unit} onChange={e=>updL(l._k,'unit',e.target.value)} style={{fontSize:12}}/></div>
      <div><input className="fi mono" type="number" step="0.01" value={l.prix_unit} onChange={e=>updL(l._k,'prix_unit',parseFloat(e.target.value)||0)} style={{fontSize:12,textAlign:'right'}}/></div>
      <div className="mono" style={{fontSize:12.5,textAlign:'right',fontWeight:600}}>{fEuro((l.qty||0)*(l.prix_unit||0))}</div>
      <div><button className="btn btn-g btn-xs" onClick={()=>rmL(l._k)}>{Ic.trash({s:13,c:'#C92A2A'})}</button></div>
    </div>)}
    <div style={{display:'flex',gap:6,marginTop:12,flexWrap:'wrap'}}><button className="btn btn-o btn-sm" onClick={()=>addL('service')}>{Ic.plus({s:13})} Prestation</button><button className="btn btn-o btn-sm" onClick={()=>addL('consumable')}>{Ic.plus({s:13})} Consommable</button><button className="btn btn-o btn-sm" onClick={()=>addL('custom')}>{Ic.plus({s:13})} Libre</button></div>
    <div style={{textAlign:'right',marginTop:20,padding:'12px 0',borderTop:'2px solid var(--border)'}}>
      <div style={{fontSize:13,marginBottom:4}}>Total HT : <strong className="mono">{fEuro(tHT)}</strong></div>
      {(e?.tva_rate??0)>0&&<div style={{fontSize:13,marginBottom:4}}>TVA {e.tva_rate}% : <strong className="mono">{fEuro(tTVA)}</strong></div>}
      <div style={{fontSize:18,fontWeight:700}}>Total TTC : <span className="mono">{fEuro(tTTC)}</span></div>
      {(e?.tva_rate??0)===0&&e?.tva_mention&&<div style={{fontSize:11,color:'var(--text-mut)',marginTop:4}}>{e.tva_mention}</div>}
    </div>
  </Modal>);
}

// ============================================================
// DEVIS PREVIEW MODAL
// ============================================================
function DPrev({st,eMap,d,onClose,sm,show}) {
  const e=eMap[d.entity_id];const [lines,setLines]=useState([]);
  useEffect(()=>{st.fetchLines(d.id).then(setLines)},[d.id]);
  const cs=async(s,x={})=>{await st.updateStatus(d.id,s,x);show('Mis à jour');onClose()};
  const acts={draft:[{l:'Envoyé',fn:()=>cs('sent'),c:'btn-p'}],sent:[{l:'Accepté',fn:()=>cs('accepted'),c:'btn-ok'},{l:'Refusé',fn:()=>cs('rejected'),c:'btn-err'}],
    accepted:[{l:'Planifier',fn:()=>{onClose();sm({t:'sched',d})},c:'btn-p'}],
    scheduled:[{l:'Vol demandé',fn:()=>cs('flight_requested',{flight_requested:true}),c:'btn-o'},{l:'Vol approuvé',fn:()=>cs('flight_approved',{flight_approved:true}),c:'btn-ok'},{l:'Réalisé',fn:()=>cs('completed',{completed_date:new Date().toISOString()}),c:'btn-ok'}],
    flight_requested:[{l:'Vol approuvé',fn:()=>cs('flight_approved',{flight_approved:true}),c:'btn-ok'}],
    flight_approved:[{l:'Réalisé',fn:()=>cs('completed',{completed_date:new Date().toISOString()}),c:'btn-ok'}],
    completed:[{l:'Facturé',fn:()=>cs('invoiced',{invoiced_date:new Date().toISOString()}),c:'btn-p'}]};
  const a=acts[d.status]||[];
  return(<Modal title={`Devis N°${d.number}`} onClose={onClose} wide footer={<div style={{display:'flex',gap:8,width:'100%',justifyContent:'space-between',flexWrap:'wrap'}}>
    <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}><Status s={d.status}/><button className="btn btn-o btn-sm" onClick={()=>dlPDF(d,e,lines)}>{Ic.pdf({s:13})} PDF</button></div>
    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{d.status==='draft'&&<button className="btn btn-o btn-sm" onClick={()=>{onClose();sm({t:'newD',d})}}>{Ic.edit({s:13})} Modifier</button>}{a.map((x,i)=><button key={i} className={`btn btn-sm ${x.c}`} onClick={x.fn}>{x.l}</button>)}</div></div>}>
    <div className="dp"><div className="dp-h"><div className="dp-ent"><strong style={{color:e?.color}}>{e?.name}</strong>{e?.legal_name}<br/>{e?.address}<br/>{e?.postal_code} {e?.city}{e?.phone&&<><br/>Tél : {e.phone}</>}</div>
      <div className="dp-cli"><strong>{d.client_name}</strong>{d.client_address&&<>{d.client_address}<br/></>}{d.client_postal} {d.client_city}<br/>France</div></div>
      <div className="dp-tit">Devis N° {d.number}</div>{d.title&&<div style={{fontWeight:600,fontSize:13,marginBottom:4}}>{d.title}</div>}
      <div className="dp-meta">Émission : {fDate(d.created_at)} · Validité : {d.validity_days} jours</div>
      {d.description&&<div className="dp-desc">{d.description}</div>}
      <table><thead><tr>{['Désignation','Qté','Unité','PU','TVA','Montant HT'].map((h,i)=><th key={i} style={{background:e?.color||'var(--pri)',color:'#fff',fontSize:10,padding:'8px 10px',textAlign:i===5?'right':'left'}}>{h}</th>)}</tr></thead>
        <tbody>{lines.map((l,i)=><tr key={i}><td>{l.designation}</td><td className="mono">{Number(l.qty).toLocaleString('fr-FR',{minimumFractionDigits:2})}</td><td>{l.unit}</td><td className="mono">{Number(l.prix_unit).toFixed(2)}</td><td>{l.tva_rate}%</td><td className="mono" style={{textAlign:'right',fontWeight:600}}>{fEuro(l.qty*l.prix_unit)}</td></tr>)}</tbody></table>
      <div className="dp-tot"><div className="tl">Total HT : <strong>{fEuro(d.total_ht)}</strong></div>{(e?.tva_rate??0)>0&&<div className="tl">TVA {e.tva_rate}% : <strong>{fEuro(d.total_tva)}</strong></div>}<div className="tl ttc">Total TTC : {fEuro(d.total_ttc)}</div></div>
      <div className="dp-foot">{e?.tva_mention&&<div>{e.tva_mention}</div>}{e?.cgv&&<div>{e.cgv}</div>}<div style={{marginTop:8}}>SIREN {e?.siren}{e?.naf&&` - NAF ${e.naf}`}{e?.rcs&&` - RCS ${e.rcs}`}</div>{e?.tva_intra&&<div>TVA intracommunautaire : {e.tva_intra}</div>}{e?.iban&&<div>IBAN: {e.iban} · BIC: {e.bic}</div>}<div style={{marginTop:16,fontStyle:'italic'}}>Pour être accepté, le devis doit être daté, signé et suivi de la mention « Bon pour accord ».</div></div>
    </div>
  </Modal>);
}

// ============================================================
// SCHEDULE / CATALOG FORM / TEMPLATE FORM MODALS
// ============================================================
function SchedM({d,st,onClose,show}) {
  const [dt,setDt]=useState(d.intervention_date||'');const [n,setN]=useState(d.intervention_notes||'');
  const save=async()=>{if(!dt){alert('Date requise');return;}await st.updateDevis(d.id,{intervention_date:dt,intervention_notes:n,status:'scheduled'});show('Planifié');onClose()};
  return(<Modal title={`Planifier — ${d.client_name}`} onClose={onClose} footer={<><button className="btn btn-o" onClick={onClose}>Annuler</button><button className="btn btn-p" onClick={save}>Planifier</button></>}>
    <div className="fg"><label className="fl">Date</label><input className="fi" type="date" value={dt} onChange={e=>setDt(e.target.value)}/></div>
    <div className="fg"><label className="fl">Notes</label><textarea className="ft" value={n} onChange={e=>setN(e.target.value)}/></div></Modal>);
}
function CatForm({st,onClose,item,show}) {
  const isN=!item?.id;const [tp,setTp]=useState(item?.itemType||'service');
  const [des,setDes]=useState(item?.designation||'');const [pm,setPm]=useState(item?.prix_m2??'');const [cat,setCat]=useState(item?.category||'');
  const [pl,setPl]=useState(item?.prix_litre??'');const [cm,setCm]=useState(item?.conso_m2??'');const [un,setUn]=useState(item?.unit||'litres');
  const save=async()=>{if(!des){alert('Désignation requise');return;}
    if(tp==='service')await st.upsertSvc({...(item?.id?{id:item.id}:{}),designation:des,prix_m2:parseFloat(pm)||0,category:cat});
    else await st.upsertCons({...(item?.id?{id:item.id}:{}),designation:des,prix_litre:parseFloat(pl)||0,conso_m2:parseFloat(cm)||0,unit:un});show('OK');onClose()};
  return(<Modal title={isN?'Nouvel élément':'Modifier'} onClose={onClose} footer={<><button className="btn btn-o" onClick={onClose}>Annuler</button><button className="btn btn-p" onClick={save}>OK</button></>}>
    {isN&&<div className="fg"><label className="fl">Type</label><div style={{display:'flex',gap:8}}><button className={`btn ${tp==='service'?'btn-p':'btn-o'}`} onClick={()=>setTp('service')}>Prestation</button><button className={`btn ${tp==='consumable'?'btn-p':'btn-o'}`} onClick={()=>setTp('consumable')}>Consommable</button></div></div>}
    <div className="fg"><label className="fl">Désignation</label><input className="fi" value={des} onChange={e=>setDes(e.target.value)}/></div>
    {tp==='service'?<div className="form-row"><div className="fg"><label className="fl">Prix/m²</label><input className="fi" type="number" step="0.01" value={pm} onChange={e=>setPm(e.target.value)}/></div><div className="fg"><label className="fl">Catégorie</label><input className="fi" value={cat} onChange={e=>setCat(e.target.value)}/></div></div>
    :<div className="form-row-3"><div className="fg"><label className="fl">Prix/L</label><input className="fi" type="number" step="0.01" value={pl} onChange={e=>setPl(e.target.value)}/></div><div className="fg"><label className="fl">Conso/m²</label><input className="fi" type="number" step="0.001" value={cm} onChange={e=>setCm(e.target.value)}/></div><div className="fg"><label className="fl">Unité</label><input className="fi" value={un} onChange={e=>setUn(e.target.value)}/></div></div>}
  </Modal>);
}
function TplForm({st,onClose,tpl,show}) {
  const isE=!!tpl;const [nm,setNm]=useState(tpl?.name||'');const [cat,setCat]=useState(tpl?.category||'');
  const [ti,setTi]=useState(tpl?.title||'');const [desc,setDesc]=useState(tpl?.description||'');
  const [ds,setDs]=useState(tpl?.default_services||[]);const [dc,setDc]=useState(tpl?.default_consumables||[]);
  const tog=(a,s,id)=>s(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const save=async()=>{if(!nm||!desc){alert('Nom et description requis');return;}await st.upsertTpl({...(tpl?.id?{id:tpl.id}:{}),name:nm,category:cat,title:ti,description:desc,default_services:ds,default_consumables:dc});show('OK');onClose()};
  return(<Modal title={isE?`Modifier « ${tpl.name} »`:'Nouveau modèle'} onClose={onClose} wide footer={<><button className="btn btn-o" onClick={onClose}>Annuler</button><button className="btn btn-p" onClick={save}>OK</button></>}>
    <div className="form-row"><div className="fg"><label className="fl">Nom *</label><input className="fi" value={nm} onChange={e=>setNm(e.target.value)}/></div><div className="fg"><label className="fl">Catégorie</label><input className="fi" value={cat} onChange={e=>setCat(e.target.value)}/></div></div>
    <div className="fg"><label className="fl">Intitulé pré-rempli</label><input className="fi" value={ti} onChange={e=>setTi(e.target.value)}/></div>
    <div className="fg"><label className="fl">Déroulé *</label><textarea className="ft" rows={10} value={desc} onChange={e=>setDesc(e.target.value)}/></div>
    <div className="sec-t">Prestations par défaut</div>
    <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:16}}>{st.svcs.map(s=><button key={s.id} className="btn btn-xs" onClick={()=>tog(ds,setDs,s.id)} style={{background:ds.includes(s.id)?'var(--pri)':'transparent',color:ds.includes(s.id)?'#fff':'var(--text)',border:`1.5px solid ${ds.includes(s.id)?'var(--pri)':'var(--border)'}`,fontWeight:550}}>{ds.includes(s.id)?'✓ ':''}{s.designation}</button>)}</div>
    <div className="sec-t">Consommables par défaut</div>
    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>{st.cons.map(c=><button key={c.id} className="btn btn-xs" onClick={()=>tog(dc,setDc,c.id)} style={{background:dc.includes(c.id)?'var(--warn)':'transparent',color:dc.includes(c.id)?'#fff':'var(--text)',border:`1.5px solid ${dc.includes(c.id)?'var(--warn)':'var(--border)'}`,fontWeight:550}}>{dc.includes(c.id)?'✓ ':''}{c.designation}</button>)}</div>
  </Modal>);
}

// ============================================================
// RENDER
// ============================================================
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
